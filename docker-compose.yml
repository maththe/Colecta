services:
  postgres:
    image: postgres:16-alpine
    container_name: colecta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: colecta
      POSTGRES_PASSWORD: colecta
      POSTGRES_DB: colecta
    ports:
      - "5433:5432"
    volumes:
      - colecta_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./apps/api/prisma/migrations:/colecta-prisma-migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colecta -d colecta"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  colecta_postgres_data:
